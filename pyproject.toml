[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
# Verboso por defecto (cada test con su descripción, ver tests/conftest.py),
# resumen de resultados (-ra) y las 5 pruebas más lentas (--durations).
addopts = "-v -ra --durations=5"
console_output_style = "count"
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"

[tool.ruff]
line-length = 100
target-version = "py312"
